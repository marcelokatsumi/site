<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Pessoas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <header>
            <div class="logo">
                <i class="ri-search-eye-line"></i>
                <h1>Finder</h1>
            </div>
            <p>Busque informações públicas ou figuras notórias</p>
        </header>

        <section class="search-section">
            <div class="search-wrapper">
                <i class="ri-search-line search-icon"></i>
                <input type="text" id="searchInput" placeholder="Busque por pessoas reais (Ex: Neymar, Silvio Santos, Einstein...)" autocomplete="off">
                <button id="searchBtn">Pesquisar</button>
            </div>
        </section>

        <section id="resultsContainer" class="results-container">
            <div id="loader" class="loader hidden">
                <div class="spinner"></div>
                <p>Buscando na base de dados global...</p>
            </div>

            <div id="resultsContent" class="results-content hidden">
                <!-- Data goes here -->
            </div>

            <div id="noResults" class="no-results hidden">
                <div class="icon-circle">
                    <i class="ri-user-unfollow-line"></i>
                </div>
                <h2>Pessoa não encontrada</h2>
                <p>Tente digitar o nome completo e correto. Lembre-se, sistemas públicos focam muito em pessoas com presença pública.</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
